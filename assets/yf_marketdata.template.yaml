source:
  tickers:
    - ^VIX
    - SPY
    - TLT

history:
  start_date: 2020-01-01
  end_date: today
  interval: 1d
  prepost: false

lookup:
  resolve_names: true
  full_quote_results: false
  max_results: 10

fetch:
  batch_size: 10
  threads: 4
  timeout_seconds: 60
  retry_attempts: 2
  retry_backoff_seconds: 2.0
  cache_dir: outputs/cache

outputs:
  root_dir: outputs
  format: csv
  datasets:
    history_yf:
      enabled: false
      layout: stacked
    history_raw:
      enabled: true
      layout: stacked
    history_adjusted:
      enabled: false
      layout: stacked
    history_summary:
      enabled: false
      layout: stacked
    ticker_search:
      enabled: false
      layout: stacked
    current_snapshot:
      enabled: true
      layout: stacked
      drop_identity_columns_per_ticker: true
