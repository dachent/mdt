name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  py-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile scripts
        run: python -m py_compile scripts/*.py
